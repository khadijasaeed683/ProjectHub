<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Dashboard</h1>

<h3>Welcome {{ request.user.first_name }}</h3>

<p>Email: {{ request.user.email }}</p>

<p>Role: {{ request.user.role }}</p>

<form action="{% url 'logout' %}" method="post">
    {% csrf_token %}
    <button type="submit">Logout</button>
</form>

</body>
</html>
