<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<form method="POST">

    {% csrf_token %}

    {{ form.username.label }}

    <br><br>

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

</body>
</html>
